<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kids' Collection</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
      padding: 20px;
    }
    h1 {
      margin-bottom: 20px;
      color: gold;
    }
     #productsContainer {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 20px;
  max-width: 1200px;
  margin: auto;
}
.product {
  background: #222;
  border-radius: 8px;
  padding: 15px;
  position: relative;
  transition: transform 0.2s;
  cursor: pointer;
  aspect-ratio: 3 / 4;
             /* FIXED CARD HEIGHT */
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
    .product:hover {
      transform: scale(1.05);
    }
    .product img {
  width: 100%;
  height: 180px;       /* FIXED IMAGE HEIGHT */
  object-fit: cover;  /* crops image properly */
  border-radius: 8px;
}

.product h3 {
  font-size: 16px;
  margin: 8px 0 4px;
}

.product p {
  font-size: 15px;
  color: gold;
  font-weight: bold;
}
    .fav-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: white;
    }
    .fav-btn.active {
      color: red;
    }

        .back-btn-top {
  position: absolute;
  top: 20px;
  left: 20px;
  padding: 8px 16px;
  background: gold;
  color: black;
  text-decoration: none;
  border-radius: 6px;
  font-weight: bold;
  z-index: 1000;
    }


    .back-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: gold;
      color: black;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }

     .top-bar {
  position: absolute;
  top: 20px;
  right: 20px;
  font-size: 20px;
  cursor: pointer;
  user-select: none;
}
.top-bar span {
  margin-left: 10px;
}


  </style>
</head>
<body>
  <h1>Kids' Collection</h1>

    <div class="top-bar">
  <span onclick="goToFavourites()">❤️  |</span>
  <span onclick="goToProfile()">👤  |</span>
  <span onclick="goToCart()">🛒</span>
</div>

  
  <!-- Products -->
<div id="productsContainer">
  <div class="product" data-name="kid jumpsuit" data-price="₹499" data-image="images/kids/kids1.jpg">
    <button class="fav-btn">❤️</button>
    <img src="images/kids/kids1.jpg" alt="kid jumpsuit">

    <p>₹499</p>
  </div>

  <div class="product" data-name="purple frock" data-price="₹599" data-image="images/kids/kids2.jpg">
    <button class="fav-btn">❤️</button>
    <img src="images/kids/kids2.jpg" alt="purple frock">
    <h3>purple frock</h3>
    <p>₹599</p>
  </div>

  <div class="product" data-name="kid skirt" data-price="₹699" data-image="images/kids/kids3.jpg">
    <button class="fav-btn">❤️</button>
    <img src="images/kids/kids3.jpg" alt="kid skirt">
    <h3>kid skirt</h3>
    <p>₹699</p>
  </div>

  <div class="product" data-name="pink frock" data-price="₹799" data-image="images/kids/kids4.jpg">
    <button class="fav-btn">❤️</button>
    <img src="images/kids/kids4.jpg" alt="pink frock">
    <h3>pink frock</h3>
    <p>₹799</p>
  </div>

  <div class="product" data-name="pink frock" data-price="₹899" data-image="images/kids/kids5.jpg">
    <button class="fav-btn">❤️</button>
    <img src="images/kids/kids5.jpg" alt="pink frock">
    <h3>pink frock</h3>
    <p>₹899</p>
  </div>

  <div class="product" data-name="t shirt-shorts" data-price="₹1,099" data-image="images/kids/kids6.jpg">
    <button class="fav-btn">❤️</button>
    <img src="images/kids/kids6.jpg" alt="t shirt-shorts">
    <h3>t shirt-shorts</h3>
    <p>₹1,099</p>
  </div>

  <div class="product" data-name="blue skirt" data-price="₹1,199" data-image="images/kids/kids7.jpg">
    <button class="fav-btn">❤️</button>
    <img src="images/kids/kids7.jpg" alt="blue skirt">
    <h3>blue skirt</h3>
    <p>₹1,199</p>
  </div>

  <div class="product" data-name="jean gown" data-price="₹1,399" data-image="images/kids/kids8.jpg">
    <button class="fav-btn">❤️</button>
    <img src="images/kids/kids8.jpg" alt="jean gown">

    <p>₹1,399</p>
  </div>

  <div class="product" data-name="boy set" data-price="₹1,299" data-image="images/kids/kids9.jpg">
    <button class="fav-btn">❤️</button>
    <img src="images/kids/kids9.jpg" alt="boy set">
    <h3>boy set</h3>
    <p>₹1,299</p>
  </div>

  <div class="product" data-name="korean set" data-price="₹1,499" data-image="images/kids/kids10.jpg">
    <button class="fav-btn">❤️</button>
    <img src="images/kids/kids10.jpg" alt="korean set">
    <h3>korean set</h3>
    <p>₹1,499</p>
  </div>
</div>


  <br>
  <a href="home.html" class="back-btn-top">← Back</a>

<script>

  document.querySelectorAll(".product img, .product h3, .product p").forEach(item => {
  item.addEventListener("click", (e) => {
    const parent = e.target.closest(".product");

    const product = {
      name: parent.dataset.name,
      price: parent.dataset.price,
      image: parent.dataset.image
    };

    localStorage.setItem("selectedProduct", JSON.stringify(product));
    window.location.href = "product-details-kids.html";
  });
});

// ❤️ Add to FAVOURITES (DB)
document.querySelectorAll(".fav-btn").forEach(button => {
  button.addEventListener("click", async (e) => {
    e.stopPropagation();

    const parent = e.target.closest(".product");

    // ✅ Clean price (IMPORTANT)
    const rawPrice = parent.dataset.price;
    const cleanPrice = rawPrice.replace(/[₹,]/g, "");

    const product = {
      user_id: parent.dataset.user_id,
      name: parent.dataset.name,
      price: cleanPrice,
      image: parent.dataset.image
    };

    try {
      const res = await fetch("http://localhost:3000/add-to-favourites", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(product)
      });

      const data = await res.json();

      if (data.status === "success") {
        button.classList.add("active");
        alert("Added to favourites ❤️");
      } else {
        alert("Error adding to favourites");
      }

    } catch (err) {
      console.error("❌ Fetch error:", err);
      alert("Server not responding");
    }
  });
});
function goToProfile() {
  window.location.href = "profile.html";
}

function goToFavourites() {
  window.location.href = "favourites.html";
}

function goToCart() {
  window.location.href = "cart.html";
}

</script>
</body>
</html>
