<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Men's Collection</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #111;
        color: white;
        text-align: center;
        padding: 20px;
      }
      h1 {
        margin-bottom: 20px;
        color: gold;
      }
      #productsContainer {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 20px;
        max-width: 1200px;
        margin: auto;
      }
      .product {
        background: #222;
        border-radius: 8px;
        padding: 15px;
        position: relative;
        transition: transform 0.2s;
        cursor: pointer;
        aspect-ratio: 3 / 4;
        /* FIXED CARD HEIGHT */
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .product:hover {
        transform: scale(1.05);
      }
      .product img {
        width: 100%;
        height: 180px; /* FIXED IMAGE HEIGHT */
        object-fit: cover; /* crops image properly */
        border-radius: 8px;
      }

      .product h3 {
        font-size: 16px;
        margin: 8px 0 4px;
      }

      .product p {
        font-size: 15px;
        color: gold;
        font-weight: bold;
      }

      .fav-btn {
        position: absolute;
        top: 10px;
        right: 10px;
        background: none;
        border: none;
        font-size: 22px;
        cursor: pointer;
        color: white;
      }
      .fav-btn.active {
        color: red;
      }

      .back-btn {
        display: inline-block;
        margin-top: 20px;
        padding: 10px 20px;
        background: gold;
        color: black;
        text-decoration: none;
        border-radius: 6px;
        font-weight: bold;
      }

      .back-btn-top {
        position: absolute;
        top: 20px;
        left: 20px;
        padding: 8px 16px;
        background: gold;
        color: black;
        text-decoration: none;
        border-radius: 6px;
        font-weight: bold;
        z-index: 1000;
      }

      .top-bar {
        position: absolute;
        top: 20px;
        right: 20px;
        font-size: 20px;
        cursor: pointer;
        user-select: none;
      }
      .top-bar span {
        margin-left: 10px;
      }
    </style>
  </head>
  <body>
    <h1>Men's Collection</h1>

    <div class="top-bar">
      <span onclick="goToFavourites()">❤️ |</span>
      <span onclick="goToProfile()">👤 |</span>
      <span onclick="goToCart()">🛒</span>
    </div>

    <!-- Products -->
    <div id="productsContainer">

        class="product"

      </div>

      <div
        class="product"
        data-name="Brown jacket"

        data-image="images/men/men3.jpg"
      >
        <button class="fav-btn">❤️</button>
        <img src="images/men/men3.jpg" alt="Brown jacket" />

      </div>

      <div
        class="product"
        data-name="checked blazer"
        data-price="₹499"
        data-image="images/men/men4.jpg"
      >
        <button class="fav-btn">❤️</button>
        <img src="images/men/men4.jpg" alt="checked blazer" />
        <h3>checked blazer</h3>
        <p>₹499</p>
      </div>

      <div
        class="product"
        data-name="gray blazer set"
        data-price="₹599"
        data-image="images/men/men5.jpg"
      >
        <button class="fav-btn">❤️</button>
        <img src="images/men/men5.jpg" alt="gray blazer set" />
        <h3>gray blazer set</h3>
        <p>₹599</p>
      </div>

      <div
        class="product"
        data-name="kurta"
        data-price="₹1,299"
        data-image="images/men/men6.jpg"
      >
        <button class="fav-btn">❤️</button>
        <img src="images/men/men6.jpg" alt="kurta" />
        <h3>kurta</h3>

      <div

        <button class="fav-btn">❤️</button>

      <div

      >

      <div

      </div>
    </div>

    <br />
    <a href="home.html" class="back-btn-top">← Back</a>

<script>
// ✅ PRODUCT CLICK → REDIRECT
document.querySelectorAll(".product img, .product h3, .product p").forEach(item => {
  item.addEventListener("click", (e) => {
    const parent = e.target.closest(".product");

    const product = {
      name: parent.dataset.name,
      price: parent.dataset.price,
      image: parent.dataset.image
    };

    localStorage.setItem("selectedProduct", JSON.stringify(product));
    window.location.href = "product-details-men.html";
  });
});


// ❤️ ADD TO FAVOURITES ONLY
document.querySelectorAll(".fav-btn").forEach((button) => {
  button.addEventListener("click", async (e) => {
    e.stopPropagation();

    const parent = e.target.closest(".product");

    const rawPrice = parent.dataset.price;
    const cleanPrice = rawPrice.replace(/[₹,]/g, "");

    const product = {
      user_id: 1, // ⚠️ replace later
      name: parent.dataset.name,
      price: cleanPrice,
      image: parent.dataset.image,
    };

    try {
      const res = await fetch("http://localhost:3000/add-to-favourites", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify(product),
      });

      const data = await res.json();

      if (data.status === "success") {
        button.classList.add("active");
        alert("Added to favourites ❤️");
      } else {
        alert("Error adding to favourites");
      }

    } catch (err) {
      console.error(err);
      alert("Server error");
    }
  });
});


// ✅ NAVIGATION
function goToProfile() {
  window.location.href = "profile.html";
}

function goToFavourites() {
  window.location.href = "favourites.html";
}

function goToCart() {
  window.location.href = "cart.html";
}
</script>
</body>
</html>
